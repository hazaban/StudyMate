version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: studymate-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: studymate
      POSTGRES_PASSWORD: studymate123
      POSTGRES_DB: studymate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studymate -d studymate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
